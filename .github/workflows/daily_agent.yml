
name: Execute Daily AI News Agent

on:
  schedule:
    # Triggers every single morning at 03:00 UTC (8:30 AM IST)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Preserves manual over-ride capabilities within the GitHub web UI

jobs:
  run-agent-environment:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Source Code Base
      uses: actions/checkout@v4

    - name: Initialize Runtime Environment (Python 3.11)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Leverages action caching layers for faster builds

    - name: Provision Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Trigger Orchestration Core Engine
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
